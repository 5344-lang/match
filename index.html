<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secret Match 💘</title>
  <link rel="stylesheet" href="https://spoqa.github.io/spoqa-han-sans/css/SpoqaHanSansNeo.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body>
  <div class="app-container">
    <header>
      <h1>Secret Match 💘</h1>
      <div class="header-btns">
        <button id="admin-link-btn">관리자 모드</button>
        <button id="logout-btn" style="display: none;">로그아웃</button>
      </div>
    </header>

    <section id="auth-section">
      <h2>로그인 및 시작하기</h2>
      <div class="input-card">
        <input type="text" id="userid" placeholder="아이디" required>
        <input type="password" id="password" placeholder="비밀번호" required>
      </div>
      <div class="auth-buttons">
        <button id="login-btn">로그인</button>
        <button id="signup-btn" class="secondary-btn">회원가입</button>
      </div>
    </section>

    <section id="profile-section" style="display: none;">
      <h2>내 프로필 설정</h2>
      <form id="profile-form">
        <div class="form-group">
          <label for="photo" class="photo-upload-label">
            <div class="upload-icon">📷</div>
            <div class="file-info">프로필 사진 업로드</div>
            <div id="file-name" class="file-name">파일 선택 안 됨</div>
          </label>
          <input type="file" id="photo" accept="image/*" class="photo-input">
        </div>
        
        <div class="input-card">
          <input type="text" id="nickname" placeholder="닉네임" required>
          <input type="number" id="birthYear" placeholder="태어난 해 (예: 96)" required>
          <select id="city">
            <option value="대구" selected>대구</option>
            <option value="부산">부산</option>
            <option value="구미">구미</option>
            <option value="경산">경산</option>
            <option value="울산">울산</option>
            <option value="기타">기타 지역</option>
          </select>
        </div>

        <div class="spectrum-container">
          <div class="spectrum-header">
            <span class="spectrum-title">나의 성향 스펙트럼</span>
            <span id="spectrum-label" class="personality-result">세글</span>
          </div>
          <div class="range-input-wrapper">
            <input type="range" id="personality-slider" min="0" max="100" step="1" value="50">
          </div>
          <div class="spectrum-poles">
            <span class="pole-tag">한글</span>
            <span class="pole-tag">두글</span>
          </div>
        </div>

        <textarea id="intro" placeholder="(자유롭게 어필하세요)"></textarea>
        
        <div class="toggle-container">
          <input type="checkbox" id="isParticipating" checked>
          <span class="switch"></span>
          <span class="toggle-label">이번 회차 매칭에 참여합니다</span>
        </div>
        
        <button type="submit" id="save-profile-btn">프로필 저장 및 대기실 이동</button>
      </form>
    </section>

    <section id="waitroom-section" style="display: none;">
      <div class="status-card">
        <h2 id="room-status-title">⏳ 매칭 대기 중...</h2>
        <p id="room-status-desc">관리자가 매칭을 시작할 때까지 잠시 대기해주세요.</p>
      </div>

      <div id="selection-area" style="display: none;">
        <h3>💘 매칭 지망 선택</h3>
        <div class="select-box"><label>1지망 (필수)</label><select id="pref-1"></select></div>
        <div class="select-box" id="pref-2-box"><label>2지망</label><select id="pref-2"></select></div>
        <div class="select-box" id="pref-3-box"><label>3지망</label><select id="pref-3"></select></div>
        <hr class="divider">
        <div class="select-box" id="dispref-1-box"><label>이 사람은 안돼요</label><select id="dispref-1"></select></div>
        <button id="submit-selection-btn">지망 제출하기</button>
      </div>
    </section>

    <section id="admin-section" style="display: none;">
      <h2>🛠 최고 관리자 대시보드</h2>
      <div class="admin-panel">
        <h3>매칭 시스템 제어</h3>
        <button id="admin-start-btn" class="action-btn start">매칭 시작 (선택창 열기)</button>
        <button id="admin-stop-btn" class="action-btn stop">매칭 종료 (선택창 닫기)</button>
        
        <div class="admin-options">
          <p>선택창 옵션 설정</p>
          <label class="admin-check"><input type="checkbox" id="toggle-pref2" checked> 2지망 활성화</label>
          <label class="admin-check"><input type="checkbox" id="toggle-pref3" checked> 3지망 활성화</label>
          <label class="admin-check"><input type="checkbox" id="toggle-dispref" checked> 비선호 1 활성화</label>
        </div>
      </div>
      <button onclick="location.reload()" class="secondary-btn">메인으로 돌아가기</button>
    </section>
  </div>
  <script src="script.js"></script>
</body>
</html>
